<style>
        .glass-panel {
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 12px 40px 0 rgba(20, 83, 45, 0.12);
        }
    </style>

<body class="bg-background text-on-background font-body-md h-screen w-screen overflow-hidden flex selection:bg-primary-container selection:text-on-primary-container" data-mode="connect">
<!-- Background Image Side (Hidden on Mobile) -->
<div class="hidden md:block w-1/2 h-full relative overflow-hidden">
<img alt="High-quality, professional studio photography of fresh organic vegetables and fruits" class="absolute inset-0 w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida/ADBb0uiAEn2czajC7rqlFA0D5n24bCIaLWdpT9nRKijm7L1T6QfGHK_APeYBCV558Rpi3kiwEEWmB4Nz1D4_EYhxPPLXUcSQFXZmP1xX8XGmOLm1mYJT57SRZiPbQUTEs3f3ZwQL2rJsMMOYwhtqIgaXQsD95pwyQDdu3xBb0x8cWFL8ty5eUQnO5rkG04IBFkUwcN7rBGua97oysBk08HHKrqqPs7hG3pDAIjUVwlnlhUCHO-NctWj2RDbfWso">
<!-- Lime Green Gradient Overlay -->
<div class="absolute inset-0 bg-gradient-to-tr from-surface-tint/70 to-primary-container/40 mix-blend-multiply"></div>
<!-- Branding Overlay -->
<div class="absolute bottom-12 left-12 glass-panel p-lg rounded-2xl max-w-md">
<h2 class="font-display-lg text-display-lg text-[#14532D] mb-sm">Verdant Market</h2>
<p class="font-body-lg text-body-lg text-[#14532D]/80">Freshness delivered with clarity and precision. Experience the organic vitality of our premium inventory.</p>
</div>
</div>
<!-- Login/Signup Form Side -->
<div class="w-full md:w-1/2 h-full flex flex-col justify-center items-center p-gutter relative bg-surface-container-lowest">
<!-- Mobile Logo -->
<div class="md:hidden absolute top-8 left-8">
<h1 class="font-headline-md text-headline-md text-[#14532D] font-bold">Verdant Market</h1>
</div>
<div class="w-full max-w-md glass-panel p-lg rounded-2xl flex flex-col gap-lg">
<!-- Header Section -->
<div class="flex flex-col gap-xs text-center">
<h1 class="font-headline-lg text-headline-lg text-[#14532D]">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Please enter your details to sign in.</p>
</div>
<!-- Tab Toggle -->
<div class="flex bg-surface-container p-1 rounded-full relative">
<div class="w-1/2 z-10 text-center py-2 font-label-md text-label-md text-white bg-[#14532D] rounded-full shadow-sm cursor-pointer transition-all">Log In</div>
<div class="w-1/2 z-10 text-center py-2 font-label-md text-label-md text-[#14532D] hover:bg-[#14532D]/10 rounded-full cursor-pointer transition-all">Sign Up</div>
</div>
<!-- Social Sign In Buttons -->
<div class="flex flex-col gap-sm">
<button class="w-full flex items-center justify-center gap-sm py-3 px-4 bg-white border border-outline-variant rounded-xl hover:bg-surface-variant/30 transition-colors shadow-sm">
<svg class="w-5 h-5" height="24" viewBox="0 0 48 48" width="24" xmlns="http://www.w3.org/2000/svg">
<path d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z" fill="#FFC107"></path>
<path d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z" fill="#FF3D00"></path>
<path d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z" fill="#4CAF50"></path>
<path d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z" fill="#1976D2"></path>
</svg>
<span class="font-label-md text-label-md text-[#14532D]">Continue with Google</span>
</button>
<button class="w-full flex items-center justify-center gap-sm py-3 px-4 bg-white border border-outline-variant rounded-xl hover:bg-surface-variant/30 transition-colors shadow-sm">
<svg class="w-5 h-5" fill="#1877F2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" class=""></path></svg>
<span class="font-label-md text-label-md text-[#14532D]">Continue with Facebook</span>
</button>
</div>
<div class="flex items-center gap-sm">
<div class="flex-1 h-px bg-outline-variant"></div>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Or continue with</span>
<div class="flex-1 h-px bg-outline-variant"></div>
</div>
<!-- Form -->
<form class="flex flex-col gap-md">
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-[#14532D]" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-[#14532D]/60 pointer-events-none">mail</span>
<input class="w-full bg-surface-container-low border border-outline-variant text-[#14532D] placeholder-[#14532D]/40 rounded-xl pl-12 pr-4 py-3.5 font-body-md text-body-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow" id="email" placeholder="hello@verdantmarket.com" type="email">
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-[#14532D]" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-[#14532D]/60 pointer-events-none">lock</span>
<input class="w-full bg-surface-container-low border border-outline-variant text-[#14532D] placeholder-[#14532D]/40 rounded-xl pl-12 pr-12 py-3.5 font-body-md text-body-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow" id="password" placeholder="••••••••" type="password">
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-[#14532D]/60 hover:text-[#14532D] transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Remember & Forgot -->
<div class="flex items-center justify-between">
<div class="flex items-center gap-2">
<input class="w-4 h-4 text-primary bg-surface-container-low border-outline-variant rounded focus:ring-primary focus:ring-2" id="remember" type="checkbox">
<label class="font-label-md text-label-md text-[#14532D] cursor-pointer" for="remember">Remember me</label>
</div>
<a class="font-label-md text-label-md text-primary hover:underline font-semibold" href="#">Forgot password?</a>
</div>
<!-- Submit Button -->
<button class="w-full bg-gradient-to-r from-primary to-[#14532D] text-white font-label-md text-label-md py-4 rounded-xl shadow-md hover:shadow-lg hover:-translate-y-0.5 transition-all mt-sm font-semibold text-[16px]" type="submit">
                    Log In
                </button>
</form>
<!-- Sign up link -->
<div class="text-center mt-2">
<span class="font-body-md text-body-md text-on-surface-variant">Don't have an account? </span>
<a class="font-label-md text-label-md text-primary hover:underline font-semibold" href="#">Sign up now</a>
</div>
</div>
</div>
</body></html>
