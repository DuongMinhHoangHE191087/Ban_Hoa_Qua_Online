<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Draft UI (AI Generated)</title>
    <!-- Import CSS gốc của dự án - Đường dẫn giả định để test HTML -->
    <link rel="stylesheet" href="../../../web/assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        .admin-layout { display: flex; min-height: 100vh; }
        .admin-sidebar { width: 260px; background: var(--color-surface); border-right: 1px solid var(--color-border); padding: var(--space-4); }
        .admin-main { flex: 1; padding: var(--space-6); background: var(--color-bg); }
        
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-4); margin-bottom: var(--space-6); }
        .stat-card { background: var(--color-surface); padding: var(--space-4); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); border-left: 4px solid var(--color-primary); }
        .stat-card h3 { color: var(--color-text-secondary); font-size: var(--font-size-sm); margin-bottom: var(--space-2); }
        .stat-card .value { font-size: var(--font-size-2xl); font-weight: 700; color: var(--color-text-primary); }
        .stat-card.warning { border-left-color: var(--color-warning); }

        .dashboard-row { display: grid; grid-template-columns: 2fr 1fr; gap: var(--space-6); }
        .dashboard-panel { background: var(--color-surface); padding: var(--space-5); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); }
        .dashboard-panel h2 { font-size: var(--font-size-lg); margin-bottom: var(--space-4); font-family: 'Lexend', sans-serif; }
    </style>
</head>
<body>

<div class="admin-layout">
    <aside class="admin-sidebar">
        <div class="navbar__logo mb-4">
            <div class="logo-icon"><i class="fa-solid fa-leaf"></i></div>
            <div class="logo-text">Fruit<span class="text-highlight">Mkt</span> Admin</div>
        </div>
        <ul class="navbar__menu" style="flex-direction: column; align-items: flex-start; padding: 0;">
            <li style="width: 100%;"><a href="#" class="menu-link" style="width: 100%; background: rgba(77,102,28,0.1); color: var(--color-primary);"><i class="fa-solid fa-chart-pie"></i> Dashboard</a></li>
            <li style="width: 100%;"><a href="#" class="menu-link" style="width: 100%;"><i class="fa-solid fa-box"></i> Sản phẩm</a></li>
            <li style="width: 100%;"><a href="#" class="menu-link" style="width: 100%;"><i class="fa-solid fa-store"></i> Chủ shop</a></li>
            <li style="width: 100%;"><a href="#" class="menu-link" style="width: 100%;"><i class="fa-solid fa-users"></i> Người dùng</a></li>
            <li style="width: 100%;"><a href="#" class="menu-link" style="width: 100%;"><i class="fa-solid fa-file-invoice"></i> Đơn hàng</a></li>
        </ul>
    </aside>

    <main class="admin-main">
        <h1 style="margin-bottom: var(--space-6);">Tổng quan hệ thống</h1>

        <div class="stat-grid">
            <div class="stat-card"><h3>Tổng Doanh Thu</h3><div class="value">125,500,000đ</div></div>
            <div class="stat-card"><h3>Đơn Hàng Mới</h3><div class="value">1,248</div></div>
            <div class="stat-card warning"><h3>Shop Chờ Duyệt</h3><div class="value">15</div></div>
            <div class="stat-card"><h3>User Mới (Tháng)</h3><div class="value">342</div></div>
        </div>

        <div class="dashboard-row">
            <div class="dashboard-panel">
                <h2>Biểu đồ doanh thu 30 ngày qua</h2>
                <canvas id="revenueChart" height="120"></canvas>
            </div>
            <div class="dashboard-panel">
                <h2>Truy cập nhanh & Cảnh báo</h2>
                <div class="alert alert-warning" style="margin: 0 0 var(--space-3) 0;">
                    <div><i class="fa-solid fa-triangle-exclamation"></i> Có 5 sản phẩm bị báo cáo!</div>
                </div>
                <div style="display: flex; flex-direction: column; gap: var(--space-2);">
                    <a href="#" class="btn btn-primary btn-block">Duyệt Shop ngay</a>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    const ctx = document.getElementById('revenueChart').getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['Tuần 1', 'Tuần 2', 'Tuần 3', 'Tuần 4'],
            datasets: [{
                label: 'Doanh thu (VNĐ)',
                data: [25000000, 32000000, 28000000, 40500000],
                borderColor: '#4D661C', backgroundColor: 'rgba(77, 102, 28, 0.1)', borderWidth: 2, fill: true, tension: 0.4
            }]
        },
        options: { responsive: true, plugins: { legend: { display: false } } }
    });
</script>
</body>
</html>
