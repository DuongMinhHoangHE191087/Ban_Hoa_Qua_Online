version: '3.8'

services:
  web:
    build: .
    container_name: ban_hoa_qua_online
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - DB_HOST=${DB_HOST:-localhost}
      - DB_PORT=${DB_PORT:-1433}
      - DB_NAME=${DB_NAME:-OnlineFruitShopping}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - EMAIL_FROM=${EMAIL_FROM}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SEPAY_BANK_ID=${SEPAY_BANK_ID}
      - SEPAY_ACCOUNT_NO=${SEPAY_ACCOUNT_NO}
      - SEPAY_ACCOUNT_NAME=${SEPAY_ACCOUNT_NAME}
      - SECRET_KEY=${SECRET_KEY}
      - ACCESS_TOKEN_EXPIRY_MS=${ACCESS_TOKEN_EXPIRY_MS:-900000}
      - REFRESH_TOKEN_EXPIRY_SECS=${REFRESH_TOKEN_EXPIRY_SECS:-604800}
    restart: always
