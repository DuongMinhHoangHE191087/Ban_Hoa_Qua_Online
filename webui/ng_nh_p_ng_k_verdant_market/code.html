<!DOCTYPE html>

<style>
        .glass-panel {
            background-color: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(20, 83, 45, 0.08);
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md h-screen w-screen overflow-hidden flex selection:bg-primary-container selection:text-on-primary-container">
<!-- Background Image Side (Hidden on Mobile) -->
<div class="hidden md:block w-1/2 h-full relative overflow-hidden">
<img alt="Fresh organic fruits and vegetables" class="absolute inset-0 w-full h-full object-cover" data-alt="A lush, vibrant top-down flatlay of freshly harvested organic fruits and vegetables bathed in soft, natural morning light. The composition features bright citrus, leafy greens, and deep red berries on a rustic wooden table. The image is overlaid with a subtle, airy lime green gradient that integrates perfectly with the 'Verdant Clarity' glassmorphism design system. The mood is exceptionally fresh, healthy, and inviting, symbolizing organic vitality and premium quality." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAW9Hr6MY7P9c7Y5a8EYAr8HcsIiTpMGgWSToKXCpZ_iiIQBlymZ3UTXYj_PGg2kY2Ye5M1-kr8WFM4CXz0HJEO-RNvmagLTLp_2HffUaZWHcJbZpvCcK3epCQJUkLLHPLJkgVCnDZ9ol3r3VBeCZsQaMgW4x7hqWPJMgblML2sTTOyD_MMHlSuphkbvgJl_vNYV8h95HUfmMBh2TOLhpBfSj7WRo-fTG0sybpBSqSq6qf_f6RKRPi4USU9KAr3_iTDUbZwDjeJb_k"/>
<!-- Lime Green Gradient Overlay -->
<div class="absolute inset-0 bg-gradient-to-tr from-surface-tint/60 to-primary-container/30 mix-blend-multiply"></div>
<!-- Optional: Branding Overlay -->
<div class="absolute bottom-12 left-12 glass-panel p-lg rounded-xl max-w-md">
<h2 class="font-display-lg text-display-lg text-[#14532D] mb-sm">Verdant Market</h2>
<p class="font-body-lg text-body-lg text-[#14532D]/80">Freshness delivered with clarity and precision. Experience the organic vitality of our premium inventory.</p>
</div>
</div>
<!-- Login/Signup Form Side -->
<div class="w-full md:w-1/2 h-full flex flex-col justify-center items-center p-gutter relative bg-surface">
<!-- Mobile Logo -->
<div class="md:hidden absolute top-8 left-8">
<h1 class="font-headline-md text-headline-md text-[#14532D] font-bold">Verdant Market</h1>
</div>
<div class="w-full max-w-md glass-panel p-lg rounded-xl flex flex-col gap-lg">
<!-- Header Section -->
<div class="flex flex-col gap-xs text-center">
<h1 class="font-headline-lg text-headline-lg text-[#14532D]">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Please enter your details to sign in.</p>
</div>
<!-- Tab Toggle -->
<div class="flex bg-[#DCFCE7] p-1 rounded-full relative">
<div class="w-1/2 z-10 text-center py-2 font-label-md text-label-md text-white bg-[#14532D] rounded-full shadow-sm cursor-pointer transition-all">Log In</div>
<div class="w-1/2 z-10 text-center py-2 font-label-md text-label-md text-[#14532D] hover:bg-[#14532D]/10 rounded-full cursor-pointer transition-all">Sign Up</div>
</div>
<!-- Google Sign In Button -->
<button class="w-full flex items-center justify-center gap-sm py-3 px-4 glass-panel border-[#14532D]/20 rounded-lg hover:bg-surface-variant/30 transition-colors">
<svg class="w-5 h-5" height="24" viewbox="0 0 48 48" width="24" xmlns="http://www.w3.org/2000/svg">

<path d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z" fill="#1976D2"></path>
</svg>
<span class="font-label-md text-label-md text-[#14532D]">Continue with Google</span>
</button>
<div class="flex items-center gap-sm">
<div class="flex-1 h-px bg-outline-variant"></div>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Or continue with</span>
<div class="flex-1 h-px bg-outline-variant"></div>
</div>
<!-- Form -->
<form class="flex flex-col gap-md">
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-[#14532D]" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-[#14532D]/60 pointer-events-none">mail</span>
<input class="w-full bg-[#DCFCE7] border border-[#14532D]/20 text-[#14532D] placeholder-[#14532D]/40 rounded-lg pl-10 pr-4 py-3 font-body-md text-body-md focus:outline-none focus:ring-2 focus:ring-[#14532D] focus:border-transparent transition-shadow" id="email" placeholder="hello@verdantmarket.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-[#14532D]" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-[#14532D]/60 pointer-events-none">lock</span>
<input class="w-full bg-[#DCFCE7] border border-[#14532D]/20 text-[#14532D] placeholder-[#14532D]/40 rounded-lg pl-10 pr-10 py-3 font-body-md text-body-md focus:outline-none focus:ring-2 focus:ring-[#14532D] focus:border-transparent transition-shadow" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-[#14532D]/60 hover:text-[#14532D] transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
<div class="flex justify-end mt-1">
<a class="font-label-sm text-label-sm text-[#14532D] hover:underline decoration-[#14532D]/50 underline-offset-4" href="#">Forgot password?</a>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-[#14532D] text-white font-label-md text-label-md py-3 rounded-lg shadow-md hover:bg-[#0f4022] hover:shadow-lg hover:-translate-y-0.5 transition-all mt-sm" type="submit">
                    Log In
                </button>
</form>
</div>
</div>
</body></html>
